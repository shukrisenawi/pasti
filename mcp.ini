[mcp_servers.chrome-devtools]
args = ["chrome-devtools-mcp@latest"]
command = "npx"
enabled = true

[mcp_servers.exa]
enabled = true
url = "https://mcp.exa.ai/mcp"

[mcp_servers.exa.http_headers]
exaApiKey = "f3c18c6e-86df-4571-af46-55e692b6da73"

[mcp_servers.shadcn]
args = ["shadcn@4.0.2", "mcp"]
command = 'C:\Program Files\nodejs\npx.cmd'
enabled = true

[mcp_servers.context7]
enabled = true
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.http_headers]
CONTEXT7_API_KEY = "ctx7sk-710154f8-4e66-4d3c-a2f6-eec7fcca65a3"

[mcp_servers.mysql]
args = ["-y", "@berthojoris/mcp-mysql-server", "mysql://root:@127.0.0.1:3306/lr_pasti", "list,read,utility,create,update,delete,execute,ddl,transaction"]
command = 'C:\Program Files\nodejs\npx.cmd'
enabled = true

[mcp_servers.dart]
args = ["mcp-server", "--force-roots-fallback"]
command = 'C:\flutter\bin\dart.bat'
enabled = true

[mcp_servers.flutter-docs]
args = ["flutter-mcp", "--stdio"]
command = 'C:\Program Files\nodejs\npx.cmd'
enabled = true
